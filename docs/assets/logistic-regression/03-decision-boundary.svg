  <circle cx="405" cy="255" r="12" fill="#2f7ed8"/>
  <circle cx="455" cy="295" r="12" fill="#2f7ed8"/>

  <circle cx="520" cy="195" r="12" fill="#d65252"/>
  <circle cx="560" cy="165" r="12" fill="#d65252"/>
