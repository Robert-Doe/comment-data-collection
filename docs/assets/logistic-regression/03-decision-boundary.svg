<svg xmlns="http://www.w3.org/2000/svg" width="900" height="450" viewBox="0 0 900 450">
  <rect width="900" height="450" fill="#f6f4ef"/>
  <text x="34" y="38" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#17324d">Decision Boundary Intuition</text>
  <text x="34" y="68" font-family="Arial, sans-serif" font-size="16" fill="#425466">With two features, logistic regression separates classes using a line.</text>

  <line x1="100" y1="380" x2="820" y2="380" stroke="#17324d" stroke-width="3"/>
  <line x1="120" y1="405" x2="120" y2="100" stroke="#17324d" stroke-width="3"/>
  <text x="390" y="415" font-family="Arial, sans-serif" font-size="16" fill="#425466">feature 1</text>
  <text x="40" y="260" transform="rotate(-90 40 260)" font-family="Arial, sans-serif" font-size="16" fill="#425466">feature 2</text>

  <line x1="250" y1="370" x2="680" y2="120" stroke="#17324d" stroke-width="5" stroke-dasharray="10 8"/>
  <text x="542" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#17324d">decision boundary</text>

  <circle cx="210" cy="330" r="12" fill="#2f7ed8"/>
  <circle cx="255" cy="295" r="12" fill="#2f7ed8"/>
  <circle cx="285" cy="345" r="12" fill="#2f7ed8"/>
  <circle cx="330" cy="280" r="12" fill="#2f7ed8"/>
