<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430">
  <rect width="1000" height="430" fill="#f6f4ef"/>
  <text x="36" y="38" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#17324d">Why Logistic Regression Uses the Sigmoid</text>

  <text x="112" y="78" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#17324d">Linear regression output</text>
  <line x1="90" y1="350" x2="440" y2="350" stroke="#17324d" stroke-width="3"/>
  <line x1="110" y1="380" x2="110" y2="110" stroke="#17324d" stroke-width="3"/>
  <text x="275" y="392" font-family="Arial, sans-serif" font-size="16" fill="#425466">raw score</text>
  <text x="20" y="240" transform="rotate(-90 20 240)" font-family="Arial, sans-serif" font-size="16" fill="#425466">predicted value</text>
  <path d="M120 320 L420 150" fill="none" stroke="#c03d3d" stroke-width="6"/>
  <line x1="110" y1="140" x2="440" y2="140" stroke="#999" stroke-dasharray="8 8" stroke-width="2"/>
  <line x1="110" y1="290" x2="440" y2="290" stroke="#999" stroke-dasharray="8 8" stroke-width="2"/>
  <text x="448" y="145" font-family="Courier New, monospace" font-size="16" fill="#425466">1.0</text>
  <text x="448" y="295" font-family="Courier New, monospace" font-size="16" fill="#425466">0.0</text>
  <text x="150" y="122" font-family="Arial, sans-serif" font-size="16" fill="#8a1f1f">Can go above 1</text>
  <text x="240" y="335" font-family="Arial, sans-serif" font-size="16" fill="#8a1f1f">Can go below 0</text>

  <text x="612" y="78" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#17324d">Logistic regression output</text>
  <line x1="560" y1="350" x2="910" y2="350" stroke="#17324d" stroke-width="3"/>
  <line x1="580" y1="380" x2="580" y2="110" stroke="#17324d" stroke-width="3"/>
  <text x="745" y="392" font-family="Arial, sans-serif" font-size="16" fill="#425466">raw score z</text>
  <text x="490" y="240" transform="rotate(-90 490 240)" font-family="Arial, sans-serif" font-size="16" fill="#425466">probability p</text>
  <line x1="580" y1="140" x2="910" y2="140" stroke="#999" stroke-dasharray="8 8" stroke-width="2"/>
  <line x1="580" y1="290" x2="910" y2="290" stroke="#999" stroke-dasharray="8 8" stroke-width="2"/>
  <text x="918" y="145" font-family="Courier New, monospace" font-size="16" fill="#425466">1.0</text>
  <text x="918" y="295" font-family="Courier New, monospace" font-size="16" fill="#425466">0.0</text>
  <path d="M610 295 C655 292, 680 285, 708 262 C744 232, 748 199, 775 189 C812 173, 815 145, 878 140"
        fill="none" stroke="#0f7a42" stroke-width="6"/>
  <line x1="580" y1="215" x2="910" y2="215" stroke="#c9ccd1" stroke-dasharray="8 8" stroke-width="2"/>
  <text x="918" y="220" font-family="Courier New, monospace" font-size="16" fill="#425466">0.5</text>
  <text x="645" y="122" font-family="Arial, sans-serif" font-size="16" fill="#0f7a42">Always stays in [0, 1]</text>
</svg>
