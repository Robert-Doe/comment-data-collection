server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  etag on;

  location = /config.js {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location ~* \.(?:js|css)$ {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location ~* \.html$ {
    add_header Cache-Control "no-cache" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache" always;
    try_files $uri $uri/ /index.html;
  }
}
