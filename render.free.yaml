services:
  - type: web
    name: ugc-free
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.free
    autoDeploy: false
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: WORKER_CONCURRENCY
        value: 1
      - key: INITIAL_QUEUE_FILL
        value: 1
      - key: QUEUE_REFILL_COUNT
        value: 1
      - key: INGEST_BATCH_SIZE
        value: 50
      - key: API_RESULTS_PAGE_SIZE
        value: 50
      - key: POST_LOAD_DELAY_MS
        value: 6000
      - key: PRE_SCREENSHOT_DELAY_MS
        value: 1500
      - key: SCAN_TIMEOUT_MS
        value: 90000
      - key: NAVIGATION_RETRIES
        value: 2
      - key: LOAD_SETTLE_PASSES
        value: 2
      - key: NEGATIVE_RETRY_SETTLE_PASSES
        value: 2
      - key: ACTION_SETTLE_MS
        value: 1250
      - key: LOCAL_STATE_PATH
        value: /tmp/ugc-local-state.json
      - key: ARTIFACT_ROOT
        value: /tmp/ugc-artifacts
